<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pelajar</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f4f6;
}

header{
background:#15803d;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
color:#166534;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

button{

padding:18px;

font-size:18px;

border:none;

border-radius:12px;

background:#16a34a;

color:white;

cursor:pointer;

}

button:hover{

background:#15803d;

}

</style>

</head>

<body>

<header>

🕌 Dashboard Pelajar

</header>

<div class="container">

<div class="card">

<h2>Selamat Datang</h2>

<p><b>Nama :</b> <span id="nama"></span></p>

<p><b>Tingkatan :</b> <span id="tingkatan"></span></p>

<p>⭐ XP : <b>0</b></p>

<p>🏆 Level : <b>1</b></p>

</div>

<div class="grid">

<button>📖 Hafazan Baru</button>

<button>🔄 Murajaah</button>

<button>🎯 Misi Harian</button>

<button>🏆 Ranking</button>

<button>🎁 Ganjaran</button>

<button onclick="logout()">🚪 Log Keluar</button>

</div>

</div>

<script>

document.getElementById("nama").innerHTML=localStorage.getItem("nama");

document.getElementById("tingkatan").innerHTML=localStorage.getItem("tingkatan");

function logout(){

localStorage.clear();

window.location="index.html";

}

</script>

</body>
</html>
