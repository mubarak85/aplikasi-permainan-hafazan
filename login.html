<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Pelajar</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f766e,#14532d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
width:90%;
max-width:420px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
text-align:center;
}

h1{
color:#065f46;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#16a34a;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<div class="card">

<h1>🕌 Login Pelajar</h1>

<input id="nama" placeholder="Nama Pelajar">

<input id="tingkatan" placeholder="Tingkatan">

<button onclick="login()">
MASUK PERMAINAN
</button>

</div>

<script>

function login(){

let nama=document.getElementById("nama").value;

let tingkatan=document.getElementById("tingkatan").value;

if(nama=="" || tingkatan==""){

alert("Sila lengkapkan maklumat.");

return;

}

localStorage.setItem("nama",nama);

localStorage.setItem("tingkatan",tingkatan);

window.location="pelajar.html";

}

</script>

</body>
</html>
